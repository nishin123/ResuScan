<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Feedback – ResuScan</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top left, #e0f2fe 0, #f9fafb 40%, #eef2ff 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .page-wrapper {
      width: 100%;
      max-width: 1200px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .page-title {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #0f172a;
    }

    .page-subtitle {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: #6b7280;
    }

    .badge-light-pill {
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #eff6ff, #e0f2fe);
      color: #1d4ed8;
      border: 1px solid rgba(148, 163, 184, 0.6);
      box-shadow: 0 3px 10px rgba(148,163,184,0.35);
    }

    .card {
      border-radius: 18px;
      border: 1px solid rgba(226,232,240,0.9) !important;
      box-shadow:
        0 16px 40px rgba(15,23,42,0.06),
        0 0 0 1px rgba(255,255,255,0.9);
      background: linear-gradient(135deg, #ffffff, #f9fafb);
    }

    .card-header {
      border-bottom: 1px solid rgba(226,232,240,0.8);
      padding: 14px 18px;
      background: transparent;
    }

    .card-header h5 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
    }

    .table thead th {
      background-color: #eef2ff;
      color: #1f2937;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }

    .table tbody tr:hover {
      background-color: #f3f4ff;
    }

    .feedback-message {
      max-width: 350px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type-pill {
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

  </style>
</head>
<body>

<div class="page-wrapper">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h2 class="page-title">Feedback</h2>
      <p class="page-subtitle">See what users say about the platform.</p>
    </div>
    <span class="badge-light-pill">User Feedback</span>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-header">
      <h5>Feedback List</h5>
    </div>

    <div class="card-body">
      <div class="table-responsive">
        <table id="registrationTable" class="table table-striped table-bordered">
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>Message</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody>
          {% for i in data %}
            <tr>
              <td>{{ forloop.counter }}</td>
              <td>{{ i.USER.name }}</td>
              <td class="feedback-message">{{ i.message }}</td>
              <td>
                <span class="type-pill">{{ i.type }}</span>
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  $(document).ready(function () {
    $('#registrationTable').DataTable();
  });
</script>

</body>
</html>
