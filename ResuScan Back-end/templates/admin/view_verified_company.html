<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verified Companies – ResuScan Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #e0f2fe, #f9fafb 40%, #eef2ff);
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }

    .page-wrapper {
      max-width: 1200px;
      width: 100%;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0;
      color: #0f172a;
    }

    .badge-light-pill {
      padding: 7px 14px;
      border-radius: 50px;
      background: #dbeafe;
      border: 1px solid #bfdbfe;
      font-size: 0.78rem;
      color: #1e40af;
      font-weight: 600;
    }

    .card {
      border-radius: 18px;
      border: 1px solid rgba(226,232,240,0.9);
      background: rgba(255,255,255,0.95);
      box-shadow: 0 18px 40px rgba(15,23,42,0.08);
    }

    .card-header {
      padding: 15px 20px;
      border-bottom: 1px solid #e5e7eb;
      background: transparent;
    }

    .card-header h5 {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: #6b7280;
      text-transform: uppercase;
    }

    /* Table */
    .table thead th {
      background: #eef2ff;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 50px;
      border: 1px solid #bbf7d0;
      background: #dcfce7;
      color: #166534;
      font-size: 0.75rem;
    }

    /* Default dropdown arrow */

.dataTables_wrapper .dataTables_length select {
    background-image: none !important;
    padding-right: 2rem !important;
}


.dataTables_wrapper .dataTables_length select {
    appearance: auto !important;
    -webkit-appearance: auto !important;
    -moz-appearance: auto !important;
}


  </style>
</head>
<body>

<div class="page-wrapper">

  <div class="page-header">
    <div>
      <h2 class="page-title">Verified Companies</h2>
    </div>
    <span class="badge-light-pill">Verified</span>
  </div>

  <div class="card">
    <div class="card-header">
      <h5>Approved Company List</h5>
    </div>

    <div class="card-body">
      <div class="table-responsive">
        <table id="verifiedTable" class="table table-striped table-bordered align-middle">
          <thead>
            <tr>
              <th>Si.no</th>
              <th>Name</th>
              <th>Place</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Longitude</th>
              <th>Latitude</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
          {% for i in data %}
            <tr>
              <td></td>
              <td>{{ i.name }}</td>
              <td>{{ i.place }}</td>
              <td>{{ i.email }}</td>
              <td>{{ i.phone }}</td>
              <td>{{ i.longitude }}</td>
              <td>{{ i.latitude }}</td>
              <td><span class="pill">{{ i.status }}</span></td>
            </tr>
          {% endfor %}
          </tbody>

        </table>
      </div>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  $(document).ready(function () {

    const table = $('#verifiedTable').DataTable({
      pageLength: 10,
      columnDefs: [{ targets: 0, orderable: false, searchable: false }],
      order: [[1, "asc"]],
    });

    // Fix numbering
    table.on("draw order search", function () {
      let i = 1;
      table.column(0, { search: "applied", order: "applied" })
           .nodes()
           .each(function (cell) {
             cell.innerHTML = i++;
           });
    }).draw();

  });
</script>

</body>
</html>
