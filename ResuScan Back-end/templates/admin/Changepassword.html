<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password – ResuScan</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #e0f2fe 0, #f9fafb 38%, #eef2ff 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .wrapper {
        background: #ffffff;
        padding: 28px 26px 32px;
        width: 100%;
        max-width: 420px;
        border-radius: 22px;
        border: 1px solid rgba(226,232,240,0.9);
        box-shadow:
            0 20px 50px rgba(15,23,42,0.10),
            0 0 0 1px rgba(255,255,255,0.9);
    }

    .title {
        text-align: center;
        font-size: 1.4rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 20px;
    }

    form {
        width: 100%;
    }

    .input-group {
        margin-bottom: 18px;
        position: relative;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #334155;
    }

    input[type="password"],
    input[type="text"] {
        width: 100%;
        padding: 12px 40px 12px 14px;
        font-size: 0.9rem;
        border: 1px solid rgba(203,213,225,0.9);
        border-radius: 12px;
        outline: none;
        background: #ffffff;
        transition: 0.15s ease;
        box-shadow: 0 5px 14px rgba(15,23,42,0.04);
    }

    input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
    }

    /* Password toggle button */
    .toggle-password {
        position: absolute;
        right: 12px;
        top: 34px;
        cursor: pointer;
        width: 22px;
        height: 22px;
        opacity: 0.6;
        transition: opacity 0.2s;
        background: none;
        border: none;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .toggle-password:hover {
        opacity: 1;
    }

    .toggle-password img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    /* Password match status */
    .match-status {
        font-size: 0.8rem;
        margin-top: 6px;
        min-height: 20px;
        display: flex;
        align-items: center;
        gap: 5px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .match-status.show {
        opacity: 1;
    }

    .match-valid {
        color: #10b981;
    }

    .match-invalid {
        color: #ef4444;
    }

    /* Error messages */
    .error-message {
        color: #ef4444;
        font-size: 0.8rem;
        margin-top: 6px;
        min-height: 20px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .error-message.show {
        opacity: 1;
    }

    /* Requirements note */
    .requirements-note {
        font-size: 0.75rem;
        color: #64748b;
        text-align: center;
        margin: 8px 0 16px;
        font-style: italic;
        transition: color 0.3s ease;
    }

    .requirements-note.valid {
        color: #10b981;
    }

    /* Password requirements box */
    .requirements {
        background: #f8fafc;
        border-radius: 10px;
        padding: 12px 14px;
        margin: 12px 0 18px;
        border: 1px solid #e2e8f0;
        font-size: 0.85em;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: all 0.3s ease;
    }

    .requirements.show {
        max-height: 200px;
        opacity: 1;
    }

    .requirements h4 {
        font-size: 0.85rem;
        color: #475569;
        margin-bottom: 6px;
    }

    .requirements ul {
        list-style: none;
        padding-left: 0;
    }

    .requirements li {
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .requirements li.valid {
        color: #10b981;
    }

    .requirements li.valid::before {
        content: "✓";
        color: #10b981;
    }

    .requirements li::before {
        content: "•";
        color: #94a3b8;
        font-size: 0.8rem;
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
        margin-top: 10px;
        box-shadow: 0 8px 18px rgba(37,99,235,0.35);
    }

    .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(37,99,235,0.45);
    }

    .submit-btn:active:not(:disabled) {
        transform: translateY(0);
    }

    .submit-btn:disabled {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        cursor: not-allowed;
        opacity: 0.7;
        transform: none;
        box-shadow: none;
    }

</style>
</head>
<body>

<div class="wrapper">
    <h2 class="title">Change Password</h2>

    <form id="form1" name="form1" method="post" action="/Changepassword_post" onsubmit="return validateForm()">

        <!-- Old Password -->
        <div class="input-group">
            <label for="oldPassword">Old Password</label>
            <input type="password" name="oldPassword" id="oldPassword" required minlength="6" />
            <button type="button" class="toggle-password" onclick="togglePassword('oldPassword', this)" aria-label="Show password">
                <img src="/static/img/show.png" alt="Show password">
            </button>
            <div id="oldPassword-error" class="error-message"></div>
        </div>

        <!-- New Password -->
        <div class="input-group">
            <label for="newPassword">New Password</label>
            <input type="password" name="newPassword" id="newPassword" required minlength="8"
                   onfocus="showRequirements()"
                   oninput="checkPasswordRequirements()"
                   onblur="checkHideRequirements()" />
            <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)" aria-label="Show password">
                <img src="/static/img/show.png" alt="Show password">
            </button>
            <div id="newPassword-error" class="error-message"></div>
        </div>

        <p class="requirements-note" id="requirements-note">Click on the new password field to see requirements</p>

        <!-- Password Requirements -->
        <div class="requirements" id="requirements">
            <h4>Password Requirements:</h4>
            <ul>
                <li id="req-length">At least 8 characters</li>
                <li id="req-uppercase">Contains uppercase letter</li>
                <li id="req-lowercase">Contains lowercase letter</li>
                <li id="req-number">Contains number</li>
                <li id="req-special">Contains special character (!@#$%^&*)</li>
            </ul>
        </div>

        <!-- Repeat Password -->
        <div class="input-group">
            <label for="repeatPassword">Repeat Password</label>
            <input type="password" name="repeatPassword" id="repeatPassword" required minlength="8"
                   oninput="checkPasswordMatch()" />
            <button type="button" class="toggle-password" onclick="togglePassword('repeatPassword', this)" aria-label="Show password">
                <img src="/static/img/show.png" alt="Show password">
            </button>
            <div id="repeatPassword-error" class="error-message"></div>
            <div id="match-status" class="match-status"></div>
        </div>

        <input type="submit" name="button" id="button" value="Submit" class="submit-btn" disabled />

    </form>
</div>

<script>
// Toggle password visibility
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const icon = button.querySelector('img');

    if (input.type === "password") {
        input.type = "text";
        icon.src = "/static/img/hide.png";
        icon.alt = "Hide password";
        button.setAttribute('aria-label', 'Hide password');
    } else {
        input.type = "password";
        icon.src = "/static/img/show.png";
        icon.alt = "Show password";
        button.setAttribute('aria-label', 'Show password');
    }

    input.focus();
}

// Show password requirements
function showRequirements() {
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    requirements.classList.add('show');
    note.style.opacity = '0.5';

    // Check requirements if there's already text
    const password = document.getElementById("newPassword").value;
    if (password.length > 0) {
        checkPasswordRequirements();
    }
}

// Hide requirements if all met and field lost focus
function checkHideRequirements() {
    const password = document.getElementById("newPassword").value;
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    setTimeout(() => {
        const allValid = checkPasswordRequirements();

        if (allValid && password.length > 0) {
            requirements.classList.remove('show');
            note.style.opacity = '1';
        }
    }, 100);
}

// Check password strength requirements
function checkPasswordRequirements() {
    const password = document.getElementById("newPassword").value;
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    // Show requirements if password has content
    if (password.length > 0 && !requirements.classList.contains('show')) {
        requirements.classList.add('show');
        note.style.opacity = '0.5';
    }

    const reqChecks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*]/.test(password)
    };

    // Update requirement indicators
    document.getElementById('req-length').className = reqChecks.length ? 'valid' : '';
    document.getElementById('req-uppercase').className = reqChecks.uppercase ? 'valid' : '';
    document.getElementById('req-lowercase').className = reqChecks.lowercase ? 'valid' : '';
    document.getElementById('req-number').className = reqChecks.number ? 'valid' : '';
    document.getElementById('req-special').className = reqChecks.special ? 'valid' : '';

    // Check if all requirements are met
    const allValid = Object.values(reqChecks).every(req => req);

    // Update note text
    if (allValid && password.length > 0) {
        note.textContent = "✓ All password requirements met";
        note.className = "requirements-note valid";
    } else if (password.length > 0) {
        note.textContent = "Password requirements not yet met";
        note.className = "requirements-note";
    } else {
        note.textContent = "Click on the new password field to see requirements";
        note.className = "requirements-note";
    }

    // Update submit button state
    updateSubmitButton();

    return allValid;
}

// Check if passwords match
function checkPasswordMatch() {
    const newPass = document.getElementById("newPassword").value;
    const repeatPass = document.getElementById("repeatPassword").value;
    const matchStatus = document.getElementById("match-status");

    if (!newPass || !repeatPass) {
        matchStatus.textContent = "";
        matchStatus.className = "match-status";
        return false;
    }

    if (newPass === repeatPass) {
        matchStatus.textContent = "✓ Passwords match";
        matchStatus.className = "match-status match-valid show";
        return true;
    } else {
        matchStatus.textContent = "✗ Passwords don't match";
        matchStatus.className = "match-status match-invalid show";
        return false;
    }
}

// Update submit button state
function updateSubmitButton() {
    const submitBtn = document.getElementById("button");
    const newPass = document.getElementById("newPassword").value;
    const oldPass = document.getElementById("oldPassword").value;
    const repeatPass = document.getElementById("repeatPassword").value;

    // Check individual requirements
    const reqChecks = {
        length: newPass.length >= 8,
        uppercase: /[A-Z]/.test(newPass),
        lowercase: /[a-z]/.test(newPass),
        number: /[0-9]/.test(newPass),
        special: /[!@#$%^&*]/.test(newPass)
    };

    const requirementsMet = Object.values(reqChecks).every(req => req);
    const passwordsMatch = newPass === repeatPass;
    const oldPassFilled = oldPass.length >= 6;
    const newDifferentFromOld = newPass !== oldPass;

    // Enable button only when ALL conditions are met
    const shouldEnable = requirementsMet && passwordsMatch && oldPassFilled && newDifferentFromOld;

    submitBtn.disabled = !shouldEnable;

    // Show/hide errors
    const newPassError = document.getElementById("newPassword-error");
    const oldPassError = document.getElementById("oldPassword-error");

    if (newPass && oldPass && newPass === oldPass) {
        newPassError.textContent = "New password must be different from old password";
        newPassError.className = "error-message show";
    } else {
        newPassError.textContent = "";
        newPassError.className = "error-message";
    }

    if (oldPass && oldPass.length < 6) {
        oldPassError.textContent = "Old password must be at least 6 characters";
        oldPassError.className = "error-message show";
    } else {
        oldPassError.textContent = "";
        oldPassError.className = "error-message";
    }
}

// Main form validation
function validateForm() {
    const oldPass = document.getElementById("oldPassword").value;
    const newPass = document.getElementById("newPassword").value;
    const repeatPass = document.getElementById("repeatPassword").value;

    // Check old password
    if (oldPass.length < 6) {
        alert("Old password must be at least 6 characters long!");
        return false;
    }

    // Check new password requirements
    const reqChecks = {
        length: newPass.length >= 8,
        uppercase: /[A-Z]/.test(newPass),
        lowercase: /[a-z]/.test(newPass),
        number: /[0-9]/.test(newPass),
        special: /[!@#$%^&*]/.test(newPass)
    };

    const allRequirementsMet = Object.values(reqChecks).every(req => req);

    if (!allRequirementsMet) {
        alert("Please ensure your new password meets all requirements!");
        return false;
    }

    // Check if passwords match
    if (newPass !== repeatPass) {
        alert("New Password and Repeat Password do not match!");
        return false;
    }

    // Check if new password is different from old
    if (newPass === oldPass) {
        alert("New password must be different from old password!");
        return false;
    }

    // Prevent common weak passwords
    const weakPasswords = ['password', '12345678', 'qwerty', 'admin', 'letmein'];
    if (weakPasswords.includes(newPass.toLowerCase())) {
        alert("Please choose a stronger password!");
        return false;
    }

    return true;
}

// Initialize event listeners
document.addEventListener('DOMContentLoaded', function() {
    // Add input event listeners to all password fields
    const inputs = ['oldPassword', 'newPassword', 'repeatPassword'];

    inputs.forEach(id => {
        const input = document.getElementById(id);
        input.addEventListener('input', updateSubmitButton);

        // Add keyboard support for toggle buttons
        const toggleBtn = input.nextElementSibling;
        toggleBtn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                togglePassword(id, this);
            }
        });
    });

    // Initialize requirements note style
    const note = document.getElementById('requirements-note');
    note.style.transition = 'opacity 0.3s ease, color 0.3s ease';

    // Initial button state check
    updateSubmitButton();
});
</script>

</body>
</html>
