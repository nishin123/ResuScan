<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Reply – ResuScan</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top left, #e0f2fe 0, #f9fafb 38%, #eef2ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      padding: 28px 28px 34px;
      border-radius: 22px;
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow:
        0 20px 50px rgba(15,23,42,0.1),
        0 0 0 1px rgba(255,255,255,0.8);
    }

    .title-block {
      text-align: center;
      margin-bottom: 18px;
    }

    .title-block h4 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .title-block p {
      font-size: 0.88rem;
      color: #6b7280;
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
    }

    textarea {
      border-radius: 14px !important;
      border: 1px solid rgba(203,213,225,0.9) !important;
      padding: 12px 14px;
      font-size: 0.92rem;
      box-shadow: 0 5px 14px rgba(15,23,42,0.04);
      resize: vertical;
      min-height: 120px;
    }

    textarea:focus {
      border-color: #3b82f6 !important;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.25) !important;
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 20px rgba(37,99,235,0.35);
      transition: 0.15s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(37,99,235,0.45);
    }

    .submit-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="title-block">
    <h4>Send Reply</h4>
    <p>Respond to the user’s complaint below.</p>
  </div>

  <form action="/send_reply_post/{{ id }}" method="post">

    <div class="mb-3">
      <label for="reply" class="form-label">Reply Message</label>
      <textarea class="form-control" id="reply" name="reply" placeholder="Type your reply here..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Reply</button>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
