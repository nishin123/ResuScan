<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ResuScan – Review Ratings</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- DataTables -->
<link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f4f7fb;
    --card:#ffffff;
    --primary:#2563eb;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --radius:18px;
    --shadow:0 14px 32px rgba(0,0,0,0.08);
}

body{
    background:var(--bg);
    font-family:"Poppins",sans-serif;
}

/* Card */
.resu-card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:28px;
}

/* Header */
.page-title{
    font-size:1.8rem;
    font-weight:600;
}

.page-subtitle{
    color:var(--muted);
    margin-bottom:24px;
}

/* Table */
.table{
    margin-bottom:0;
}

.table thead th{
    background:#eff6ff !important;
    border-bottom:1px solid var(--border) !important;
    font-weight:600;
    font-size:.9rem;
    white-space:nowrap;
}

.table tbody td{
    font-size:.9rem;
    vertical-align:middle;
}

.table-striped tbody tr:nth-of-type(odd){
    background:#f8fafc;
}

/* DataTables controls */
.dataTables_wrapper .dataTables_filter input,
.dataTables_wrapper .dataTables_length select{
    border-radius:999px;
    padding:6px 14px;
    border:1px solid var(--border);
}

.dataTables_wrapper .dataTables_paginate .page-link{
    border-radius:999px !important;
    margin:0 4px;
}

/* Rating badge (visual only) */
.rating-badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:#dbeafe;
    color:var(--primary);
    font-weight:600;
    font-size:.75rem;
}

/* Responsive */
@media(max-width:768px){
    .resu-card{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="container mt-5">
    <div class="resu-card">

        <h2 class="page-title">Review Ratings</h2>
        <p class="page-subtitle">
            User feedback and company ratings
        </p>

        <table id="registrationTable" class="table table-striped table-bordered align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>User</th>
                    <th>Review</th>
                    <th>Date</th>
                    <th>Rating</th>
                    <th>Company</th>
                </tr>
            </thead>
            <tbody>
            {% for i in data %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.USER.name }}</td>
                    <td>{{ i.review }}</td>
                    <td>{{ i.date }}</td>
                    <td>
                        <span class="rating-badge">
                            {{ i.rating }}
                        </span>
                    </td>
                    <td>{{ i.COMPANY.name }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function () {
    $('#registrationTable').DataTable({
        pageLength: 10,
        lengthMenu: [
            [5, 10, 25, 50],
            [5, 10, 25, 50]
        ],
        ordering: true,
        responsive: true,
        language: {
            lengthMenu: "Show _MENU_ reviews"
        }
    });
});
</script>

</body>
</html>
