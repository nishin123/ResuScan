<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company – Change Password</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    }

    body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #e0f2fe 0, #f9fafb 38%, #eef2ff 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .wrapper {
        background: #ffffff;
        padding: 24px 24px 28px;
        width: 100%;
        max-width: 420px;
        border-radius: 18px;
        border: 1px solid rgba(226,232,240,0.9);
        box-shadow:
            0 16px 40px rgba(15,23,42,0.08),
            0 0 0 1px rgba(255,255,255,0.9);
    }

    .title {
        text-align: center;
        font-size: 1.3rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 6px;
    }

    .subtitle {
        text-align: center;
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 18px;
        line-height: 1.3;
    }

    .input-group {
        margin-bottom: 16px;
        position: relative;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.85rem;
        font-weight: 500;
        color: #334155;
    }

    input[type="password"],
    input[type="text"] {
        width: 100%;
        padding: 12px 42px 12px 14px;
        font-size: 0.9rem;
        border: 1px solid rgba(203,213,225,0.9);
        border-radius: 10px;
        outline: none;
        background: #ffffff;
        transition: 0.15s ease;
        box-shadow: 0 4px 12px rgba(15,23,42,0.03);
    }

    input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    .toggle-password {
        position: absolute;
        right: 12px;
        top: 34px;
        cursor: pointer;
        width: 20px;
        height: 20px;
        opacity: 0.7;
        transition: opacity 0.2s;
        user-select: none;
    }

    .toggle-password:hover {
        opacity: 1;
    }

    .requirements {
        background: #f8fafc;
        border-radius: 8px;
        padding: 12px 14px;
        margin: 12px 0 18px;
        border: 1px solid #e2e8f0;
        font-size: 0.9em;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: all 0.3s ease;
        transform: translateY(-10px);
    }

    .requirements.show {
        max-height: 200px;
        opacity: 1;
        transform: translateY(0);
    }

    .requirements h4 {
        font-size: 0.85rem;
        color: #475569;
        margin-bottom: 6px;
    }

    .requirements ul {
        list-style: none;
        padding-left: 0;
    }

    .requirements li {
        font-size: 0.8rem;
        color: #64748b;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .requirements li::before {
        content: "•";
        color: #94a3b8;
        font-size: 0.7rem;
    }

    .requirement-valid {
        color: #10b981 !important;
    }

    .requirement-valid::before {
        color: #10b981 !important;
        content: "✓" !important;
    }

    .match-status {
        font-size: 0.8rem;
        margin-top: 4px;
        min-height: 18px;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .match-valid {
        color: #10b981;
    }

    .match-invalid {
        color: #ef4444;
    }

    .submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s ease;
        margin-top: 8px;
        box-shadow: 0 6px 14px rgba(37,99,235,0.3);
    }

    .submit-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(37,99,235,0.35);
    }

    .submit-btn:active {
        transform: translateY(0);
    }

    .submit-btn:disabled {
        background: linear-gradient(135deg, #94a3b8, #64748b);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        opacity: 0.7;
    }

    .error-message {
        color: #ef4444;
        font-size: 0.8rem;
        margin-top: 4px;
        min-height: 18px;
    }

    .requirements-note {
        font-size: 0.75rem;
        color: #64748b;
        text-align: center;
        margin: 8px 0 16px;
        font-style: italic;
    }
</style>
</head>
<body>

<div class="wrapper">
    <h2 class="title">Change Password</h2>
    <p class="subtitle">Update your account password</p>

    <form method="post" action="/Companychangepassword_post" onsubmit="return validatePasswords();">
        <!-- {% csrf_token %} -->

        <div class="input-group">
            <label for="oldpass">Old Password</label>
            <input type="password" id="oldpass" name="textfield" required minlength="6"
                   aria-describedby="oldpass-error">
            <img src="/static/img/show.png"
                 class="toggle-password"
                 onclick="togglePassword('oldpass', this)"
                 alt="Toggle password visibility"
                 role="button"
                 tabindex="0"
                 onkeypress="if(event.key === 'Enter') togglePassword('oldpass', this)">
            <div id="oldpass-error" class="error-message" aria-live="polite"></div>
        </div>

        <div class="input-group">
            <label for="newpass">New Password</label>
            <input type="password" id="newpass" name="textfield2" required minlength="8"
                   onfocus="showRequirements()"
                   oninput="checkPasswordRequirements()"
                   onblur="checkHideRequirements()"
                   aria-describedby="newpass-error">
            <img src="/static/img/show.png"
                 class="toggle-password"
                 onclick="togglePassword('newpass', this)"
                 alt="Toggle password visibility"
                 role="button"
                 tabindex="0"
                 onkeypress="if(event.key === 'Enter') togglePassword('newpass', this)">
            <div id="newpass-error" class="error-message" aria-live="polite"></div>
        </div>

        <p class="requirements-note" id="requirements-note">Click on the new password field to see requirements</p>

        <div class="requirements" id="requirements">
            <h4>Password Requirements:</h4>
            <ul>
                <li id="req-length">At least 8 characters</li>
                <li id="req-uppercase">Contains uppercase letter</li>
                <li id="req-lowercase">Contains lowercase letter</li>
                <li id="req-number">Contains number</li>
                <li id="req-special">Contains special character (!@#$%^&*)</li>
            </ul>
        </div>

        <div class="input-group">
            <label for="repeatpass">Repeat New Password</label>
            <input type="password" id="repeatpass" name="textfield3" required minlength="8"
                   oninput="checkPasswordMatch()"
                   aria-describedby="repeatpass-error">
            <img src="/static/img/show.png"
                 class="toggle-password"
                 onclick="togglePassword('repeatpass', this)"
                 alt="Toggle password visibility"
                 role="button"
                 tabindex="0"
                 onkeypress="if(event.key === 'Enter') togglePassword('repeatpass', this)">
            <div id="repeatpass-error" class="error-message" aria-live="polite"></div>
            <div id="match-status" class="match-status" aria-live="polite"></div>
        </div>

        <input type="submit" value="Update Password" class="submit-btn" id="submitBtn" disabled>
    </form>
</div>

<script>
// Toggle password visibility
function togglePassword(inputId, icon) {
    const input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        icon.src = "/static/img/hide.png";
        icon.alt = "Hide password";
    } else {
        input.type = "password";
        icon.src = "/static/img/show.png";
        icon.alt = "Show password";
    }
    input.focus();
}

// Show password requirements
function showRequirements() {
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    requirements.classList.add('show');
    note.style.opacity = '0.5';

    // Check requirements if there's already text
    const password = document.getElementById("newpass").value;
    if (password.length > 0) {
        checkPasswordRequirements();
    }
}

// Hide requirements if all met and field lost focus
function checkHideRequirements() {
    const password = document.getElementById("newpass").value;
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    // Small delay to allow checking requirements
    setTimeout(() => {
        const allValid = checkPasswordRequirements();

        if (allValid && password.length > 0) {
            requirements.classList.remove('show');
            note.style.opacity = '1';
        }
    }, 100);
}

// Check password strength requirements
function checkPasswordRequirements() {
    const password = document.getElementById("newpass").value;
    const requirements = document.getElementById('requirements');
    const note = document.getElementById('requirements-note');

    // Show requirements if password has content
    if (password.length > 0 && !requirements.classList.contains('show')) {
        requirements.classList.add('show');
        note.style.opacity = '0.5';
    }

    const reqChecks = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[!@#$%^&*]/.test(password)
    };

    // Update requirement indicators
    document.getElementById('req-length').className = reqChecks.length ? 'requirement-valid' : '';
    document.getElementById('req-uppercase').className = reqChecks.uppercase ? 'requirement-valid' : '';
    document.getElementById('req-lowercase').className = reqChecks.lowercase ? 'requirement-valid' : '';
    document.getElementById('req-number').className = reqChecks.number ? 'requirement-valid' : '';
    document.getElementById('req-special').className = reqChecks.special ? 'requirement-valid' : '';

    // Check if all requirements are met
    const allValid = Object.values(reqChecks).every(req => req);

    // Update note text when all requirements are met
    if (allValid && password.length > 0) {
        note.textContent = "✓ All password requirements met";
        note.style.color = "#10b981";
    } else if (password.length > 0) {
        note.textContent = "Password requirements not yet met";
        note.style.color = "#64748b";
    } else {
        note.textContent = "Click on the new password field to see requirements";
        note.style.color = "#64748b";
    }

    // Update submit button state (but don't check match here - it causes circular calls)
    updateSubmitButton();

    return allValid;
}

// Check if passwords match
function checkPasswordMatch() {
    const newPass = document.getElementById("newpass").value;
    const repeatPass = document.getElementById("repeatpass").value;
    const matchStatus = document.getElementById("match-status");

    if (!newPass || !repeatPass) {
        matchStatus.textContent = "";
        matchStatus.className = "match-status";
        return false;
    }

    if (newPass === repeatPass) {
        matchStatus.textContent = "✓ Passwords match";
        matchStatus.className = "match-status match-valid";
        return true;
    } else {
        matchStatus.textContent = "✗ Passwords don't match";
        matchStatus.className = "match-status match-invalid";
        return false;
    }
}

// Update submit button state
function updateSubmitButton() {
    const submitBtn = document.getElementById("submitBtn");
    const newPass = document.getElementById("newpass").value;
    const oldPass = document.getElementById("oldpass").value;
    const repeatPass = document.getElementById("repeatpass").value;

    // Check requirements separately to avoid circular calls
    const reqChecks = {
        length: newPass.length >= 8,
        uppercase: /[A-Z]/.test(newPass),
        lowercase: /[a-z]/.test(newPass),
        number: /[0-9]/.test(newPass),
        special: /[!@#$%^&*]/.test(newPass)
    };

    const requirementsMet = Object.values(reqChecks).every(req => req);
    const passwordsMatch = newPass === repeatPass;
    const oldPassFilled = oldPass.length >= 6;
    const newDifferentFromOld = newPass !== oldPass;

    // Enable button only when ALL conditions are met
    const shouldEnable = requirementsMet && passwordsMatch && oldPassFilled && newDifferentFromOld;

    submitBtn.disabled = !shouldEnable;

    // Show error if new password is same as old
    if (newPass && oldPass && newPass === oldPass) {
        document.getElementById("newpass-error").textContent = "New password must be different from old password";
    } else {
        document.getElementById("newpass-error").textContent = "";
    }
}

// Main validation function for form submission
function validatePasswords() {
    const oldPass = document.getElementById("oldpass").value;
    const newPass = document.getElementById("newpass").value;
    const repeatPass = document.getElementById("repeatpass").value;

    // Check if old password is provided
    if (oldPass.length < 6) {
        alert("Old password must be at least 6 characters long!");
        return false;
    }

    // Check if new password meets requirements
    const reqChecks = {
        length: newPass.length >= 8,
        uppercase: /[A-Z]/.test(newPass),
        lowercase: /[a-z]/.test(newPass),
        number: /[0-9]/.test(newPass),
        special: /[!@#$%^&*]/.test(newPass)
    };

    const allRequirementsMet = Object.values(reqChecks).every(req => req);

    if (!allRequirementsMet) {
        alert("Please ensure your new password meets all requirements!");
        return false;
    }

    // Check if passwords match
    if (newPass !== repeatPass) {
        alert("New Password and Repeat Password do not match!");
        return false;
    }

    // Check if new password is different from old
    if (newPass === oldPass) {
        alert("New password must be different from old password!");
        return false;
    }

    // Prevent common weak passwords
    const weakPasswords = ['password', '12345678', 'qwerty', 'admin', 'letmein'];
    if (weakPasswords.includes(newPass.toLowerCase())) {
        alert("Please choose a stronger password!");
        return false;
    }

    return true;
}

// Initialize event listeners
document.addEventListener('DOMContentLoaded', function() {
    const inputs = ['oldpass', 'newpass', 'repeatpass'];

    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
            // Update button state whenever any input changes
            updateSubmitButton();
        });
    });

    // Initialize requirements note
    const note = document.getElementById('requirements-note');
    note.style.transition = 'opacity 0.3s ease, color 0.3s ease';

    // Initial button state check
    updateSubmitButton();
});
</script>

</body>
</html>
