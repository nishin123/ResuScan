<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ResuScan – Add Question</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#f4f7fb;
    --card:#ffffff;
    --primary:#2563eb;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
    --radius:18px;
    --shadow:0 14px 32px rgba(0,0,0,0.08);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body {
    background:var(--bg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.form-card {
    width:100%;
    max-width:700px;
    background:var(--card);
    padding:32px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

.form-card h1 {
    font-size:1.8rem;
    margin-bottom:8px;
}

.form-card p {
    color:var(--muted);
    margin-bottom:28px;
}

.form-group {
    margin-bottom:18px;
}

label {
    display:block;
    margin-bottom:6px;
    font-weight:500;
    color:var(--text);
}

input[type="text"],
textarea {
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    font-size:0.95rem;
    outline:none;
    transition:0.2s;
}

textarea {
    resize:none;
}

input:focus,
textarea:focus {
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

.options-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.submit-btn {
    margin-top:25px;
    width:100%;
    padding:14px;
    border-radius:999px;
    border:none;
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:#fff;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

.submit-btn:hover {
    transform:translateY(-3px);
    box-shadow:0 12px 28px rgba(37,99,235,0.35);
}
</style>
</head>

<body>

<div class="form-card">
    <h1>Add Question</h1>
    <p>Create multiple-choice questions for screening</p>

    <form method="post" action="/addquestions_post/{{ id }}">
        {% csrf_token %}

        <div class="form-group">
            <label>Question</label>
            <textarea name="textarea" rows="5" placeholder="Enter the question here..." required></textarea>
        </div>

        <div class="options-grid">
            <div class="form-group">
                <label>Option A</label>
                <input type="text" name="textfield2" placeholder="Option A" required>
            </div>

            <div class="form-group">
                <label>Option B</label>
                <input type="text" name="textfield3" placeholder="Option B" required>
            </div>

            <div class="form-group">
                <label>Option C</label>
                <input type="text" name="textfield4" placeholder="Option C" required>
            </div>

            <div class="form-group">
                <label>Option D</label>
                <input type="text" name="textfield5" placeholder="Option D" required>
            </div>
        </div>

        <div class="form-group">
            <label>Correct Answer</label>
            <input type="text" name="textfield6" placeholder="Example: A / B / C / D" required>
        </div>

        <button type="submit" class="submit-btn">Submit Question</button>
    </form>
</div>

</body>
</html>
