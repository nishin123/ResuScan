<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Reset Password - Parking Manager</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --teal: #1d4ed8;
            --teal-dark: #1d4ed8;
            --teal-light: #e8f8f5;
            --teal-glow: rgba(32, 201, 151, 0.2);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .forgot-container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid var(--teal-light);
        }

        .forgot-header {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .forgot-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .forgot-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            position: relative;
            z-index: 2;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .forgot-icon i {
            font-size: 2rem;
            color: white;
        }

        .forgot-body {
            padding: 3rem;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-group-modern input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            color: #2c3e50;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--teal);
            font-size: 1rem;
            z-index: 3;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--teal);
            font-size: 1.1rem;
            z-index: 5;
        }

        .btn-send {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            border: none;
            border-radius: 15px;
            padding: 1.2rem 2.5rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--teal-glow);
        }

        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="forgot-container">

                    <div class="forgot-header">
                        <div class="forgot-icon">
                            <i class="fas fa-key"></i>
                        </div>
                        <h2 class="fw-bold text-white mb-2">Reset Password</h2>
                        <p class="text-white opacity-90 mb-0">Enter your new password</p>
                    </div>

                    <div class="forgot-body">
                        <form id="resetForm" action="/forgotpswdpswedbuttonclick" method="post">

                            <div class="input-group-modern">
                                <input type="password" name="password" id="password" placeholder="New Password" required>
                                <span class="input-icon"><i class="fas fa-lock"></i></span>
                                <span class="toggle-password" onclick="togglePassword('password','icon1')">
                                    <i id="icon1" class="fas fa-eye"></i>
                                </span>
                            </div>

                            <div class="input-group-modern">
                                <input type="password" name="confirmpassword" id="confirmpassword" placeholder="Confirm Password" required>
                                <span class="input-icon"><i class="fas fa-lock"></i></span>
                                <span class="toggle-password" onclick="togglePassword('confirmpassword','icon2')">
                                    <i id="icon2" class="fas fa-eye"></i>
                                </span>
                            </div>

                            <button type="submit" class="btn-send">
                                <i class="fas fa-paper-plane me-2"></i>
                                Reset Password
                            </button>

                            <div class="back-link">
                                <a href="/login">
                                    <i class="fas fa-arrow-left me-1"></i> Back to Login
                                </a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

<script>
function togglePassword(fieldId, iconId) {
    const inputField = document.getElementById(fieldId);
    const icon = document.getElementById(iconId);

    if (inputField.type === "password") {
        inputField.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        inputField.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// Check password match validation
document.getElementById("resetForm").addEventListener("submit", function(e) {
    if (document.getElementById("password").value !== document.getElementById("confirmpassword").value) {
        e.preventDefault();
        alert("Passwords do not match!");
    }
});
</script>

</body>
</html>
